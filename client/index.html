<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Find My Professor - Connect with Research Opportunities</title>
    
    <!-- Meta Description -->
    <meta name="description" content="Find My Professor helps high school and undergraduate students discover and apply to research opportunities. Upload your resume, get AI-powered matches, and generate personalized application letters." />
    <meta name="keywords" content="research opportunities, undergraduate research, high school research, professor matching, research projects, academic research, AI matching, application letters" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://findmyprofessor.xyz/" />
    <meta property="og:title" content="Find My Professor - Connect with Research Opportunities" />
    <meta property="og:description" content="Discover research opportunities tailored to your academic interests. AI-powered matching connects students with professors and research projects." />
    <meta property="og:image" content="https://files.manuscdn.com/user_upload_by_module/session_file/310519663312383643/idhTYTPkBHGzzrVn.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://findmyprofessor.xyz/" />
    <meta name="twitter:title" content="Find My Professor - Connect with Research Opportunities" />
    <meta name="twitter:description" content="Discover research opportunities tailored to your academic interests. AI-powered matching connects students with professors and research projects." />
    <meta name="twitter:image" content="https://files.manuscdn.com/user_upload_by_module/session_file/310519663312383643/idhTYTPkBHGzzrVn.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
